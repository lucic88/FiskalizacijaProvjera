<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiskalizacija — Alat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1018;
  --surf:     #161a26;
  --surf2:    #1e2235;
  --border:   #2a2f4a;
  --accent:   #4f8ef7;
  --purple:   #7c5cbf;
  --green:    #3ecf8e;
  --red:      #f05252;
  --yellow:   #f59e0b;
  --muted:    #6b7280;
  --text:     #e8eaf0;
  --dim:      #9ca3af;
  --radius:   10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 36px 16px 80px;
}

.page-header {
  text-align: center;
  margin-bottom: 44px;
}
.page-header h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; }
.page-header p  { color: var(--dim); font-size: 0.85rem; margin-top: 5px; }

/* TABS */
.tabs {
  display: flex;
  gap: 0;
  max-width: 900px;
  margin: 0 auto 28px;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.tab-btn {
  flex: 1;
  padding: 13px 20px;
  background: none;
  border: none;
  color: var(--dim);
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  border-right: 1px solid var(--border);
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: var(--surf2); color: var(--text); }
.tab-btn .tab-icon { font-size: 1rem; margin-right: 7px; }

.tab-panel { display: none; max-width: 900px; margin: 0 auto; }
.tab-panel.active { display: block; }

/* CARD */
.card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-head {
  padding: 14px 20px;
  background: var(--surf2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--dim);
}
.card-body { padding: 22px; }

/* INVOICE SUMMARY */
.inv-meta {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.meta-item { background: var(--surf2); border-radius: 7px; padding: 12px 14px; }
.meta-item .ml { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
.meta-item .mv { font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; font-weight: 600; color: var(--text); word-break: break-all; }

/* CHECKS */
.checks-list { display: flex; flex-direction: column; gap: 8px; }
.chk {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  border: 1px solid transparent;
}
.chk.pass { background: rgba(62,207,142,0.07); border-color: rgba(62,207,142,0.18); }
.chk.fail { background: rgba(240,82,82,0.08);  border-color: rgba(240,82,82,0.22); }
.chk.warn { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.2); }
.chk-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.chk-body { flex: 1; }
.chk-title { font-weight: 600; color: var(--text); }
.chk-detail { color: var(--dim); margin-top: 3px; font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace; line-height: 1.5; }
.chk-code { font-size: 0.68rem; font-family: 'IBM Plex Mono', monospace; color: var(--muted); margin-left: auto; flex-shrink: 0; padding-top: 2px; }

.summary-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 14px 18px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-weight: 600;
  font-size: 0.95rem;
}
.summary-bar.all-ok  { background: rgba(62,207,142,0.1);  border: 1px solid rgba(62,207,142,0.25); color: var(--green); }
.summary-bar.has-err { background: rgba(240,82,82,0.1);   border: 1px solid rgba(240,82,82,0.25);  color: var(--red);   }
.summary-bar .sb-count { font-size: 0.8rem; font-weight: 400; color: var(--dim); margin-left: auto; }

/* VAT group rows */
.vat-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.vat-row:last-child { border-bottom: none; }
.vat-row:hover { background: rgba(255,255,255,0.02); }
.vat-row-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 20px;
}
.vat-rate-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  background: rgba(79,142,247,0.12);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.vat-row-title { flex: 1; font-size: 0.875rem; font-weight: 500; color: var(--text); }
.vat-row-vals { display: flex; gap: 20px; flex-shrink: 0; }
.vat-row-val { text-align: right; }
.vat-row-val .vrl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.vat-row-val .vrv { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--text); }
.vat-row .item-chevron { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; margin-left: 6px; flex-shrink: 0; }
.vat-row.open .item-chevron { transform: rotate(90deg); }
.vat-detail { display: none; padding: 0 20px 14px 20px; }
.vat-row.open .vat-detail { display: block; }

/* Items card list */
.item-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: rgba(255,255,255,0.02); }

.item-row-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
}
.item-num {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  width: 18px;
  flex-shrink: 0;
}
.item-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.item-status-dot.ok   { background: var(--green); box-shadow: 0 0 6px rgba(62,207,142,0.5); }
.item-status-dot.fail { background: var(--red);   box-shadow: 0 0 6px rgba(240,82,82,0.5); }

.item-name {
  flex: 1;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-vals {
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}
.item-val {
  text-align: right;
}
.item-val .ivl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.item-val .ivv { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--text); }
.item-chevron {
  font-size: 0.75rem;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.2s;
  margin-left: 6px;
}
.item-row.open .item-chevron { transform: rotate(90deg); }

.item-detail {
  display: none;
  padding: 0 20px 14px 48px;
}
.item-row.open .item-detail { display: block; }

.item-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.item-detail-val {
  background: var(--surf2);
  border-radius: 6px;
  padding: 8px 10px;
}
.item-detail-val .dl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.item-detail-val .dv { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; font-weight: 600; color: var(--text); }

.item-checks { display: flex; flex-direction: column; gap: 5px; }
.item-chk {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 10px; border-radius: 6px; font-size: 0.78rem;
  border: 1px solid transparent;
}
.item-chk.pass { background: rgba(62,207,142,0.06); border-color: rgba(62,207,142,0.15); }
.item-chk.fail { background: rgba(240,82,82,0.07);  border-color: rgba(240,82,82,0.2); }
.item-chk-icon { flex-shrink: 0; font-size: 0.8rem; }
.item-chk-text { flex: 1; }
.item-chk-name { font-weight: 600; color: var(--text); }
.item-chk-detail { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--dim); margin-top: 2px; }

/* ===== CALC SECTION ===== */
.calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
.calc-grid > div { display: flex; flex-direction: column; }
.calc-grid .card { flex: 1; }
@media(max-width: 620px) { .calc-grid { grid-template-columns: 1fr; } }

.verify-btn {
  width: 100%;
  margin-top: 16px;
  padding: 12px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.18s, transform 0.1s;
}
.verify-btn:hover  { background: #3a7ee8; }
.verify-btn:active { transform: scale(0.98); }
.verify-btn.rr-false { background: var(--purple); }
.verify-btn.rr-false:hover { background: #6a4aab; }

.verify-results { margin-top: 0; }
.verify-results .chk { font-size: 0.82rem; padding: 10px 12px; }
.verify-results .chk-detail { font-size: 0.75rem; }

.toggle-group {
  display: flex;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 18px;
  width: fit-content;
}
.toggle-group label {
  padding: 9px 18px;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--dim);
  transition: all 0.16s;
  user-select: none;
}
.toggle-group input[type=radio] { display: none; }
.toggle-group input[type=radio]:checked + label { background: var(--accent); color: #fff; }
.toggle-group.dec input[type=radio]:checked + label { background: var(--purple); }

.field {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.field label {
  width: 54px; flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.88rem; font-weight: 600; color: var(--text);
}
.field label small {
  display: block; font-size: 0.62rem; font-weight: 400;
  color: var(--muted); font-family: 'IBM Plex Sans', sans-serif;
}
.field input[type=text] {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 9px 12px;
  font-size: 0.9rem;
  font-family: 'IBM Plex Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.field input[type=text]:focus { border-color: var(--accent); }
.field input[type=text].purple-focus:focus { border-color: var(--purple); }
.field .unit { font-size: 0.75rem; color: var(--muted); width: 22px; text-align: right; font-family: 'IBM Plex Mono', monospace; }

.result-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid rgba(42,47,74,0.5);
}
.result-row:last-child { border-bottom: none; }
.result-name { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; font-weight: 600; }
.result-formula { font-size: 0.68rem; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; margin-top: 1px; }
.result-value { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 600; color: var(--green); min-width: 90px; text-align: right; }
.result-value.blue { color: var(--accent); }
.result-row.hl .result-value { color: #fff; font-size: 1.1rem; }
.result-row.hl { background: rgba(62,207,142,0.04); margin: 0 -22px; padding: 10px 22px; }

.divider { height: 1px; background: var(--border); margin: 6px 0; }

.badge {
  font-size: 0.7rem; font-weight: 600; padding: 3px 9px;
  border-radius: 20px; letter-spacing: 0.04em;
}
.badge-rr   { background: rgba(79,142,247,.18); color: var(--accent); }
.badge-nrr  { background: rgba(124,92,191,.18); color: var(--purple); }
.badge-dec  { background: rgba(62,207,142,.12); color: var(--green); font-family: 'IBM Plex Mono', monospace; }

.xml-input-grid {
  display: grid;
  grid-template-columns: 1fr 36px 1fr;
  gap: 0 12px;
  align-items: stretch;
  min-height: 180px;
}
@media(max-width: 620px) {
  .xml-input-grid { grid-template-columns: 1fr; grid-template-rows: auto auto auto; gap: 12px 0; }
  .xml-or-divider { flex-direction: row; }
  .xml-or-divider::before, .xml-or-divider::after { width: auto; height: 1px; flex: 1; }
}

.xml-or-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  user-select: none;
}
.xml-or-divider::before,
.xml-or-divider::after {
  content: '';
  width: 1px;
  flex: 1;
  background: var(--border);
}
.xml-or-divider span {
  padding: 6px 0;
}

.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--accent);
  background: rgba(79,142,247,0.04);
}
.dropzone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.dropzone .dz-icon { font-size: 2rem; margin-bottom: 10px; }
.dropzone .dz-title { font-size: 0.9rem; font-weight: 500; color: var(--text); }
.dropzone .dz-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

.xml-paste-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.xml-paste-area textarea {
  flex: 1;
  min-height: 140px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.73rem;
  padding: 11px 13px;
  resize: none;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.55;
}
.xml-paste-area textarea:focus { border-color: var(--accent); }
.xml-paste-area textarea::placeholder { color: var(--muted); font-style: italic; }
.xml-paste-btn {
  padding: 9px 16px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  width: 100%;
  text-align: center;
}
.xml-paste-btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="page-header">
  <h1>Fiskalizacija — Alat</h1>
  <p>Provjera računa · Kalkulator cijena</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('verify')">
    <span class="tab-icon">🔍</span>Provjera XML računa
  </button>
  <button class="tab-btn" onclick="switchTab('calc')">
    <span class="tab-icon">🧮</span>Kalkulator cijena
  </button>
</div>

<!-- ============ TAB 1: VERIFY ============ -->
<div class="tab-panel active" id="tab-verify">

  <div class="card">
    <div class="card-head">📂 Učitaj XML račun</div>
    <div class="card-body">
      <div class="xml-input-grid">
        <div class="dropzone" id="dz" ondragover="dzDrag(event,true)" ondragleave="dzDrag(event,false)" ondrop="dzDrop(event)">
          <input type="file" accept=".xml" onchange="loadFile(this.files[0])">
          <div class="dz-icon">📄</div>
          <div class="dz-title">Prevuci XML fajl ovdje</div>
          <div class="dz-sub" id="dz-sub">ili klikni za izbor · RegisterInvoiceRequest format</div>
        </div>
        <div class="xml-or-divider"><span>ILI</span></div>
        <div class="xml-paste-area">
          <textarea id="xml-paste" placeholder="Zalijepi XML ovdje...&#10;&#10;&lt;RegisterInvoiceRequest ...&gt;&#10;  ...&#10;&lt;/RegisterInvoiceRequest&gt;" onkeydown="if(event.ctrlKey&&event.key==='Enter')loadFromPaste()"></textarea>
          <button class="xml-paste-btn" onclick="loadFromPaste()">📋 Analiziraj XML</button>
        </div>
      </div>
    </div>
  </div>

  <div id="verify-output" style="display:none;">

    <div class="card">
      <div class="card-head">📋 Podaci računa</div>
      <div class="card-body">
        <div class="inv-meta" id="inv-meta"></div>
      </div>
    </div>

    <div class="card" id="checks-card">
      <div class="card-head">✅ Globalne provjere</div>
      <div class="card-body">
        <div id="summary-bar" class="summary-bar"></div>
        <div class="checks-list" id="checks-list"></div>
      </div>
    </div>

    <div class="card" id="vat-groups-card">
      <div class="card-head">🧾 Provjere po PDV stopama</div>
      <div class="card-body" style="padding:0;">
        <div id="vat-groups-list"></div>
      </div>
    </div>

    <div class="card" id="items-card">
      <div class="card-head">📦 Stavke</div>
      <div class="card-body" style="padding:0;">
        <div id="items-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- ============ TAB 2: CALC ============ -->
<div class="tab-panel" id="tab-calc">
  <div class="calc-grid">
    <div>
      <div class="card">
        <div class="card-head">
          <span class="badge badge-rr" id="c-badgeRR">RR = true</span>
          <span class="badge badge-dec" id="c-badgeDec">4 dec.</span>
          <span style="font-size:0.8rem;color:var(--dim);margin-left:4px;" id="c-cardLabel">Unos: UPB cijena</span>
        </div>
        <div class="card-body" style="padding-bottom:8px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <div class="toggle-group" id="rrGroup">
              <input type="radio" name="rr" id="rr_true"  value="true"  checked>
              <label for="rr_true">RR = true</label>
              <input type="radio" name="rr" id="rr_false" value="false">
              <label for="rr_false">RR = false</label>
            </div>
            <div class="toggle-group dec">
              <input type="radio" name="dec" id="dec_4" value="4" checked>
              <label for="dec_4">4 dec.</label>
              <input type="radio" name="dec" id="dec_2" value="2">
              <label for="dec_2">2 dec.</label>
            </div>
          </div>
          <div id="c-inputs"></div>
          <button class="verify-btn" id="c-verify-btn" onclick="verifyCalc()">
            🔍 Provjeri
          </button>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-head">📊 Rezultati</div>
        <div class="card-body" id="c-results"></div>
        <div class="checks-list verify-results" id="c-verify-results" style="padding:0 22px 16px;display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ======== TAB ========
function switchTab(t) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ======== DROPZONE ========
function dzDrag(e, on) { e.preventDefault(); document.getElementById('dz').classList.toggle('dragover', on); }
function dzDrop(e) { e.preventDefault(); dzDrag(e, false); loadFile(e.dataTransfer.files[0]); }

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseAndVerify(e.target.result);
  reader.readAsText(file);
  document.querySelector('.dz-title').textContent = file.name;
  document.getElementById('dz-sub').textContent = (file.size / 1024).toFixed(1) + ' KB';
}

function loadFromPaste() {
  const xml = document.getElementById('xml-paste').value.trim();
  if (!xml) { alert('Nema XML sadržaja za analizu.'); return; }
  parseAndVerify(xml);
}

// ======== DECIMAL DETECTION ========
// "2.3670" → 4 dec (3rd decimal is non-zero), "2.3700" → 2 dec (only 2 significant decimals)
function detectDecimals(strVal) {
  if (!strVal || !strVal.includes('.')) return 2;
  const dec = strVal.split('.')[1] || '';
  // find last non-zero digit position
  let last = 0;
  for (let i = 0; i < dec.length; i++) {
    if (dec[i] !== '0') last = i + 1;
  }
  // if 3rd or 4th decimal is non-zero → 4 decimals
  return last > 2 ? 4 : 2;
}

function detectItemDecimals(itemEls) {
  // Check UPB, UPA, PB, VA, PA raw string values from XML attributes
  const priceAttrs = ['UPB','UPA','PB','VA','PA'];
  for (const el of itemEls) {
    for (const a of priceAttrs) {
      const raw = el.getAttribute(a);
      if (raw && detectDecimals(raw) === 4) return 4;
    }
  }
  return 2;
}

// ======== PARSING ========
function attr(el, name, def = null) {
  const v = el?.getAttribute(name);
  return v !== null ? v : def;
}
function num(el, name, def = 0) {
  const v = el?.getAttribute(name);
  return v !== null ? parseFloat(v) : def;
}
function bool(el, name) {
  return (el?.getAttribute(name) ?? '').toLowerCase() === 'true';
}

function parseAndVerify(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');
  const NS = 'https://efi.tax.gov.me/fs/schema';

  const qs  = (tag) => doc.getElementsByTagNameNS(NS, tag)[0];
  const qsa = (tag) => [...doc.getElementsByTagNameNS(NS, tag)];

  const inv     = qs('Invoice');
  const payMeth = qsa('PayMethod');
  const itemEls = qsa('I');
  const stEls   = qsa('SameTax');
  const seller  = qs('Seller');
  const buyer   = qs('Buyer');

  if (!inv) { alert('XML nije validan RegisterInvoiceRequest format.'); return; }

  const invData = {
    InvType:        attr(inv, 'InvType'),
    TypeOfInv:      attr(inv, 'TypeOfInv'),
    IssueDateTime:  attr(inv, 'IssueDateTime'),
    InvNum:         attr(inv, 'InvNum'),
    TotPrice:       num(inv, 'TotPrice'),
    TotPriceWoVAT:  num(inv, 'TotPriceWoVAT'),
    TotVATAmt:      num(inv, 'TotVATAmt'),
    IsIssuerInVAT:  attr(inv, 'IsIssuerInVAT') === 'true',
    TCRCode:        attr(inv, 'TCRCode'),
    OperatorCode:   attr(inv, 'OperatorCode'),
    BusinUnitCode:  attr(inv, 'BusinUnitCode'),
    IIC:            attr(inv, 'IIC'),
  };

  const xmlDec = detectItemDecimals(itemEls);

  const items = itemEls.map((el, i) => ({
    idx: i + 1,
    N:   attr(el, 'N'),
    C:   attr(el, 'C'),
    U:   attr(el, 'U'),
    Q:   num(el, 'Q'),
    R:   num(el, 'R', 0),
    RR:  bool(el, 'RR'),
    UPB: num(el, 'UPB'),
    UPA: num(el, 'UPA'),
    VR:  num(el, 'VR', 0),
    PB:  num(el, 'PB'),
    VA:  num(el, 'VA', 0),
    PA:  num(el, 'PA'),
  }));

  const sameTaxes = stEls.map(el => ({
    NumOfItems:   parseInt(attr(el, 'NumOfItems', '0')),
    PriceBefVAT:  num(el, 'PriceBefVAT'),
    VATRate:      num(el, 'VATRate'),
    VATAmt:       num(el, 'VATAmt'),
    ExemptFromVAT: attr(el, 'ExemptFromVAT'),
  }));

  const pmTotal = payMeth.reduce((s, el) => s + num(el, 'Amt'), 0);

  renderMeta(invData, seller, buyer, payMeth, xmlDec);
  renderItems(items, xmlDec);
  runChecks(invData, items, sameTaxes, pmTotal, xmlDec);
  document.getElementById('verify-output').style.display = 'block';
  setTimeout(() => document.getElementById('verify-output').scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

// ======== RENDER META ========
function renderMeta(inv, seller, buyer, payMeth, xmlDec) {
  const m = document.getElementById('inv-meta');
  function mitem(label, val) {
    return `<div class="meta-item"><div class="ml">${label}</div><div class="mv">${val || '—'}</div></div>`;
  }

  m.innerHTML = [

    mitem('Tip', inv.InvType + ' / ' + inv.TypeOfInv),

    mitem('TotPriceWoVAT', inv.TotPriceWoVAT.toFixed(2)),
    mitem('TotVATAmt', inv.TotVATAmt.toFixed(2)),

    mitem('Prodavac', sellerTxt),
    mitem('Kupac', buyerTxt),

    mitem('Preciznost stavki', `<span style="color:${xmlDec===4?'var(--accent)':'var(--purple)'}">${xmlDec} decimale</span>`),

    const checkRows = allChecks.map(c => `
      <div class="item-chk ${c.pass ? 'pass' : 'fail'}">

function toggleItem(idx) {
  const row = document.getElementById('item-row-' + idx);
  row.classList.toggle('open');
}

function itemAllChecks(it, xmlDec) {
  const dec = xmlDec || 4;
  const factor = Math.pow(10, dec);
  const rN = v => Math.round(v * factor) / factor;
  const tol = 0.01;
  const fd = v => v.toFixed(dec);
  const checks = [];

  function c(name, pass, okDetail, failDetail) {
    checks.push({ name, pass, detail: pass ? okDetail : failDetail });
  }

  if (it.RR) {
    let exp;
    exp = rN(it.PB + it.VA);
    c('CHK-007 · PA = PB + VA', Math.abs(it.PA - exp) <= tol,
      `${fd(it.PA)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.PA)}`);

    exp = rN(it.UPB * (1 - it.R/100) * it.Q);
    c('CHK-008 · PB = UPB·(1−R%)·Q', Math.abs(it.PB - exp) <= tol,
      `${fd(it.PB)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.PB)}`);

    exp = rN(it.PB * it.VR / 100);
    c('CHK-021 · VA = PB·VR%', Math.abs(it.VA - exp) <= tol,
      `${fd(it.VA)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.VA)}`);

    exp = rN(it.UPB * (1 + it.VR/100) * (1 - it.R/100));
    c('CHK-022 · UPA = UPB·(1+VR%)·(1−R%)', Math.abs(it.UPA - exp) <= tol,
      `${fd(it.UPA)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.UPA)}`);
  } else {
    let exp;
    exp = rN(it.UPA * it.Q);
    c('CHK-010 · PA = UPA·Q', Math.abs(it.PA - exp) <= tol,
      `${fd(it.PA)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.PA)}`);

    exp = rN(it.UPA / ((1 + it.VR/100) * (1 - it.R/100)));
    c('CHK-027 · UPB = UPA/((1+VR%)·(1−R%))', Math.abs(it.UPB - exp) <= tol,
      `${fd(it.UPB)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.UPB)}`);

    exp = rN(it.PA - it.VA);
    c('CHK-028 · PB = PA − VA', Math.abs(it.PB - exp) <= tol,
      `${fd(it.PB)} ✓`, `Izračunato ${fd(exp)}, uneseno ${fd(it.PB)}`);
  }

  return checks;
}

function itemErrors(it, xmlDec) {
  return itemAllChecks(it, xmlDec).filter(c => !c.pass).map(c => c.detail);
}

// ======== RUN ALL CHECKS ========
function runChecks(inv, items, sameTaxes, pmTotal, xmlDec) {
  const globalChecks = [];
  const r2 = v => Math.round(v * 100) / 100;
  const factor = Math.pow(10, xmlDec);
  const rN = v => Math.round(v * factor) / factor;
  const fd = v => v.toFixed(xmlDec);
  const tol = 0.01;

  function chk(code, title, pass, detail, failDetail) {
    globalChecks.push({ code, title, pass, detail: pass ? detail : (failDetail || detail) });
  }

  // TotPrice = TotPriceWoVAT + TotVATAmt
  {
    const expected = r2(inv.TotPriceWoVAT + inv.TotVATAmt);
    chk('TOT-1', 'TotPrice = TotPriceWoVAT + TotVATAmt',
      Math.abs(inv.TotPrice - expected) <= tol,
      `${inv.TotPrice.toFixed(2)} = ${inv.TotPriceWoVAT.toFixed(2)} + ${inv.TotVATAmt.toFixed(2)} = ${expected.toFixed(2)}`,
      `Očekivano ${expected.toFixed(2)}, dobijeno ${inv.TotPrice.toFixed(2)}`);
  }

  // TotPrice = SUM(PayMethods)
  if (inv.InvType !== 'PERIODICAL') {
    const expected = r2(pmTotal);
    chk('TOT-2', 'TotPrice = Σ PayMethod iznosa',
      Math.abs(inv.TotPrice - expected) <= tol,
      `${inv.TotPrice.toFixed(2)} = ${expected.toFixed(2)}`,
      `Suma plaćanja ${expected.toFixed(2)} ≠ TotPrice ${inv.TotPrice.toFixed(2)}`);
  }

  // CHK-AMT-005
  {
    const stSum = sameTaxes.reduce((s, st) => s + st.PriceBefVAT, 0);
    const expected = r2(stSum);
    chk('CHK-AMT-005', 'TotPriceWoVAT = Σ SameTax.PriceBefVAT',
      Math.abs(inv.TotPriceWoVAT - expected) <= tol,
      `${inv.TotPriceWoVAT.toFixed(2)} = ${expected.toFixed(2)}`,
      `Očekivano ${expected.toFixed(2)}, dobijeno ${inv.TotPriceWoVAT.toFixed(2)}`);
  }

  // CHK-AMT-009
  if (inv.InvType !== 'SUMMARY' || items.length > 0) {
    const vaSum = r2(items.reduce((s, it) => s + it.VA, 0));
    chk('CHK-AMT-009', 'TotVATAmt = Σ stavki VA',
      Math.abs(inv.TotVATAmt - vaSum) <= tol,
      `${inv.TotVATAmt.toFixed(2)} = ${vaSum.toFixed(2)}`,
      `Suma VA = ${vaSum.toFixed(2)}, TotVATAmt = ${inv.TotVATAmt.toFixed(2)}`);
  }

  // CHK-AMT-023
  if (inv.InvType !== 'CORRECTIVE' && inv.InvType !== 'CREDIT_NOTE') {
    const neg = items.filter(it => it.Q < 0 || it.UPA < 0 || it.UPB < 0 || it.PA < 0 || it.PB < 0 || it.VA < 0);
    const stNeg = sameTaxes.filter(st => st.VATAmt < 0 || st.PriceBefVAT < 0);
    chk('CHK-AMT-023', 'Nema negativnih iznosa na računu',
      neg.length === 0 && stNeg.length === 0,
      `Sve vrijednosti su pozitivne`,
      `Negativni iznosi na stavkama: ${neg.map(it => it.N.substring(0,20)).join(', ')}`);
  }

  renderChecks(globalChecks);
  renderVatGroups(sameTaxes, items, xmlDec);

  // auto-expand failed VAT groups
  setTimeout(() => {
    document.querySelectorAll('[id^="vat-row-"]').forEach(row => {
      const dot = row.querySelector('.item-status-dot');
      if (dot && dot.classList.contains('fail')) row.classList.add('open');
    });
  }, 50);
}

// ======== RENDER VAT GROUPS ========
function renderVatGroups(sameTaxes, items, xmlDec) {
  const container = document.getElementById('vat-groups-list');
  const factor = Math.pow(10, xmlDec);
  const rN = v => Math.round(v * factor) / factor;
  const fd = v => v.toFixed(xmlDec);
  const tol = 0.01;

  if (!sameTaxes.length) {
    container.innerHTML = '<div style="padding:16px 20px;color:var(--muted);font-size:0.82rem;">Nema SameTax podataka.</div>';
    return;
  }

  container.innerHTML = sameTaxes.map((st, idx) => {
    const partition = items.filter(it => (it.VR || 0) === (st.VATRate || 0));
    const pbSum = rN(partition.reduce((s, it) => s + it.PB, 0));
    const vaSum = rN(partition.reduce((s, it) => s + it.VA, 0));

    const checks = [
      {
        code: 'CHK-001', name: 'Broj stavki',
        pass: st.NumOfItems === partition.length,
        ok:   `NumOfItems=${st.NumOfItems} = ${partition.length} stavki`,
        fail: `NumOfItems=${st.NumOfItems} ≠ stvarnih stavki ${partition.length}`,
      },
      {
        code: 'CHK-002', name: 'PriceBefVAT = Σ PB',
        pass: Math.abs(st.PriceBefVAT - pbSum) <= tol,
        ok:   `${fd(st.PriceBefVAT)} ≈ ${fd(pbSum)}`,
        fail: `PriceBefVAT=${fd(st.PriceBefVAT)}, Σ PB=${fd(pbSum)}`,
      },
      {
        code: 'CHK-003', name: 'VATAmt = Σ VA',
        pass: Math.abs(st.VATAmt - vaSum) <= tol,
        ok:   `${fd(st.VATAmt)} ≈ ${fd(vaSum)}`,
        fail: `VATAmt=${fd(st.VATAmt)}, Σ VA=${fd(vaSum)}`,
      },
    ];

    const hasFail = checks.some(c => !c.pass);
    const dotCls  = hasFail ? 'fail' : 'ok';

    const checkRows = checks.map(c => `
      <div class="item-chk ${c.pass ? 'pass' : 'fail'}">
        <span class="item-chk-icon">${c.pass ? '✓' : '✗'}</span>
        <div class="item-chk-text">
          <div class="item-chk-name">${c.code} · ${c.name}</div>
          <div class="item-chk-detail">${c.pass ? c.ok : c.fail}</div>
        </div>
      </div>`).join('');

    const stavkeList = partition.map(it =>
      `<span style="font-size:0.72rem;color:var(--dim);display:block;padding:1px 0;">${it.idx}. ${it.N}</span>`
    ).join('');

    return `
      <div class="vat-row ${hasFail ? '' : ''}" id="vat-row-${idx}" onclick="toggleVat(${idx})">
        <div class="vat-row-header">
          <span class="item-status-dot ${dotCls}"></span>
          <span class="vat-rate-badge">${st.VATRate}%</span>
          <span class="vat-row-title">${st.NumOfItems} stavki</span>
          <div class="vat-row-vals">
            <div class="vat-row-val"><div class="vrl">PriceBefVAT</div><div class="vrv">${fd(st.PriceBefVAT)}</div></div>
            <div class="vat-row-val"><div class="vrl">VATAmt</div><div class="vrv">${fd(st.VATAmt)}</div></div>
          </div>
          <span class="item-chevron">▶</span>
        </div>
        <div class="vat-detail">
          <div class="item-checks" style="margin-bottom:10px;">${checkRows}</div>
          <div style="padding-top:6px;border-top:1px solid var(--border);">${stavkeList}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleVat(idx) {
  document.getElementById('vat-row-' + idx).classList.toggle('open');
}

function renderChecks(checks) {
  const failures = checks.filter(c => !c.pass).length;
  const bar = document.getElementById('summary-bar');
  if (failures === 0) {
    bar.className = 'summary-bar all-ok';
    bar.innerHTML = `✅ Sve globalne provjere prošle <span class="sb-count">${checks.length} provjera</span>`;
  } else {
    bar.className = 'summary-bar has-err';
    bar.innerHTML = `❌ ${failures} globalnih provjera nije prošlo <span class="sb-count">${checks.length} ukupno</span>`;
  }

  const list = document.getElementById('checks-list');
  list.innerHTML = checks.map(c => `
    <div class="chk ${c.pass ? 'pass' : 'fail'}">
      <span class="chk-icon">${c.pass ? '✓' : '✗'}</span>
      <div class="chk-body">
        <div class="chk-title">${c.title}</div>
        <div class="chk-detail">${c.detail.replace(/\n/g,'<br>')}</div>
      </div>
      <span class="chk-code">${c.code}</span>
    </div>`).join('');
}

// ======== CALCULATOR ========
const cs = { rr: true, dec: 4, Q: 0, R: 0, VR: 21, UPB: 0, UPA: 0 };

function roundN(v, d) { return Math.round(v * Math.pow(10, d)) / Math.pow(10, d); }
function fmtC(v) { if (v === null || isNaN(v) || !isFinite(v)) return '—'; return v.toFixed(cs.dec); }

function calcC() {
  const { Q, R, VR, UPB, UPA, dec } = cs;
  const r = v => roundN(v, dec);
  if (cs.rr) {
    return {
      UPA: r(UPB * (1 + VR/100) * (1 - R/100)),
      PB:  r(UPB * (1 - R/100) * Q),
      VA:  r(UPB * (1 - R/100) * Q * (VR/100)),
      PA:  r(UPB * (1 - R/100) * Q * (1 + VR/100)),
    };
  } else {
    const PA = r(UPA * Q);
    const VA = r(PA * (1 - 1 / (1 + VR/100)));
    return {
      UPB: r(UPA / ((1 + VR/100) * (1 - R/100))),
      PA,  VA,
      PB:  r(PA - VA),
    };
  }
}

function renderCalc() {
  // badges
  const isRR = cs.rr;
  document.getElementById('c-badgeRR').textContent  = isRR ? 'RR = true' : 'RR = false';
  document.getElementById('c-badgeRR').className    = 'badge ' + (isRR ? 'badge-rr' : 'badge-nrr');
  document.getElementById('c-badgeDec').textContent = cs.dec + ' dec.';
  document.getElementById('c-cardLabel').textContent = isRR ? 'Unos: UPB cijena' : 'Unos: UPA cijena';

  // inputs
  const iCls = isRR ? '' : ' style="border-color:var(--purple);"';
  const fields = isRR
    ? [{k:'Q',l:'Q',d:'Količina',u:''},{k:'R',l:'R',d:'Rabat',u:'%'},{k:'VR',l:'VR',d:'Porez',u:'%'},{k:'UPB',l:'UPB',d:'Cijena bez poreza',u:''}]
    : [{k:'Q',l:'Q',d:'Količina',u:''},{k:'R',l:'R',d:'Rabat',u:'%'},{k:'VR',l:'VR',d:'Porez',u:'%'},{k:'UPA',l:'UPA',d:'Cijena sa porezom',u:''}];

  // Q i VR nikad ne trebaju decimale kao unos, R može biti 0-100
  // UPB/UPA se formatira na odabrani broj decimala
  const priceKeys = ['UPB', 'UPA'];
  document.getElementById('c-inputs').innerHTML = fields.map(f => {
    const isQ = f.k === 'Q';
    const isPrice = priceKeys.includes(f.k) || f.k === 'R';
    const decimals = isQ ? 3 : isPrice ? cs.dec : 0;
    const dispVal = cs[f.k].toFixed(decimals);
    const purpleCls = !cs.rr ? ' purple-focus' : '';
    return `<div class="field">
      <label>${f.l}<small>${f.d}</small></label>
      <input type="text" id="inp_${f.k}" value="${dispVal}" class="${purpleCls.trim()}"
        oninput="ci('${f.k}', this.value, false)"
        onblur="ci('${f.k}', this.value, true)">
      <span class="unit">${f.u}</span>
    </div>`;
  }).join('');

  // results
  const res = calcC();
  let rows = '';
  if (isRR) {
    rows = `
      <div class="sec-label">Rezultati</div>
      <div class="result-row hl">
        <div><div class="result-name">UPA</div><div class="result-formula">UPB·(1+VR%)·(1−R%)</div></div>
        <div class="result-value">${fmtC(res.UPA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">PB</div><div class="result-formula">UPB·(1−R%)·Q</div></div>
        <div class="result-value blue">${fmtC(res.PB)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">VA</div><div class="result-formula">PB·VR%</div></div>
        <div class="result-value blue">${fmtC(res.VA)}</div>
      </div>
      <div class="result-row hl">
        <div><div class="result-name">PA</div><div class="result-formula">PB + VA</div></div>
        <div class="result-value">${fmtC(res.PA)}</div>
      </div>`;
  } else {
    rows = `
      <div class="sec-label">Rezultati</div>
      <div class="result-row hl">
        <div><div class="result-name">UPB</div><div class="result-formula">UPA / ((1+VR%)·(1−R%))</div></div>
        <div class="result-value">${fmtC(res.UPB)}</div>
      </div>
      <div class="result-row hl">
        <div><div class="result-name">PA</div><div class="result-formula">UPA · Q</div></div>
        <div class="result-value">${fmtC(res.PA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">VA</div><div class="result-formula">PA·(1−1/(1+VR%))</div></div>
        <div class="result-value blue">${fmtC(res.VA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">PB</div><div class="result-formula">PA − VA</div></div>
        <div class="result-value blue">${fmtC(res.PB)}</div>
      </div>`;
  }
  document.getElementById('c-results').innerHTML = rows;
}

function ci(k, raw, isBlur) {
  // accept both comma and dot as decimal separator
  const normalized = raw.replace(',', '.');
  const p = parseFloat(normalized);
  if (isNaN(p)) return;
  cs[k] = p;

  if (isBlur) {
    // format the input value on blur
    const el = document.getElementById('inp_' + k);
    if (el) {
      const priceKeys = ['UPB', 'UPA'];
      const decimals = k === 'Q' ? 3 : (priceKeys.includes(k) || k === 'R') ? cs.dec : 0;
      el.value = p.toFixed(decimals);
    }
  }

  renderResults();
}

function renderResults() {
  const isRR = cs.rr;
  const res = calcC();
  let rows = '';
  if (isRR) {
    rows = `
      <div class="sec-label">Rezultati</div>
      <div class="result-row hl">
        <div><div class="result-name">UPA</div><div class="result-formula">UPB·(1+VR%)·(1−R%)</div></div>
        <div class="result-value">${fmtC(res.UPA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">PB</div><div class="result-formula">UPB·(1−R%)·Q</div></div>
        <div class="result-value blue">${fmtC(res.PB)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">VA</div><div class="result-formula">PB·VR%</div></div>
        <div class="result-value blue">${fmtC(res.VA)}</div>
      </div>
      <div class="result-row hl">
        <div><div class="result-name">PA</div><div class="result-formula">PB + VA</div></div>
        <div class="result-value">${fmtC(res.PA)}</div>
      </div>`;
  } else {
    rows = `
      <div class="sec-label">Rezultati</div>
      <div class="result-row hl">
        <div><div class="result-name">UPB</div><div class="result-formula">UPA / ((1+VR%)·(1−R%))</div></div>
        <div class="result-value">${fmtC(res.UPB)}</div>
      </div>
      <div class="result-row hl">
        <div><div class="result-name">PA</div><div class="result-formula">UPA · Q</div></div>
        <div class="result-value">${fmtC(res.PA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">VA</div><div class="result-formula">PA·(1−1/(1+VR%))</div></div>
        <div class="result-value blue">${fmtC(res.VA)}</div>
      </div>
      <div class="result-row">
        <div><div class="result-name">PB</div><div class="result-formula">PA − VA</div></div>
        <div class="result-value blue">${fmtC(res.PB)}</div>
      </div>`;
  }
  document.getElementById('c-results').innerHTML = rows;
}

function verifyCalc() {
  const res = calcC();
  const tol = 0.01;
  const dec = cs.dec;
  const rN = v => Math.round(v * Math.pow(10, dec)) / Math.pow(10, dec);
  const fd = v => (typeof v === 'number' ? v : 0).toFixed(dec);
  const checks = [];

  function chk(title, pass, ok, fail) {
    checks.push({ title, pass, detail: pass ? ok : fail });
  }

  if (cs.rr) {
    // CHK-AMT-022: UPA = UPB*(1+VR%)*(1-R%)
    const expUPA = rN(cs.UPB * (1 + cs.VR/100) * (1 - cs.R/100));
    chk('CHK-022 · UPA = UPB·(1+VR%)·(1−R%)',
      Math.abs(res.UPA - expUPA) <= tol,
      `${fd(res.UPA)} ✓`,
      `Izračunato ${fd(expUPA)}, uneseno ${fd(res.UPA)}`);

    // CHK-AMT-008: PB = UPB*(1-R%)*Q
    const expPB = rN(cs.UPB * (1 - cs.R/100) * cs.Q);
    chk('CHK-008 · PB = UPB·(1−R%)·Q',
      Math.abs(res.PB - expPB) <= tol,
      `${fd(res.PB)} ✓`,
      `Izračunato ${fd(expPB)}, uneseno ${fd(res.PB)}`);

    // CHK-AMT-021: VA = PB*VR%
    const expVA = rN(res.PB * cs.VR/100);
    chk('CHK-021 · VA = PB·VR%',
      Math.abs(res.VA - expVA) <= tol,
      `${fd(res.VA)} ✓`,
      `Izračunato ${fd(expVA)}, uneseno ${fd(res.VA)}`);

    // CHK-AMT-007: PA = PB + VA
    const expPA = rN(res.PB + res.VA);
    chk('CHK-007 · PA = PB + VA',
      Math.abs(res.PA - expPA) <= tol,
      `${fd(res.PA)} ✓`,
      `Izračunato ${fd(expPA)}, uneseno ${fd(res.PA)}`);
  } else {
    // CHK-AMT-010: PA = UPA*Q
    const expPA = rN(cs.UPA * cs.Q);
    chk('CHK-010 · PA = UPA·Q',
      Math.abs(res.PA - expPA) <= tol,
      `${fd(res.PA)} ✓`,
      `Izračunato ${fd(expPA)}, uneseno ${fd(res.PA)}`);

    // CHK-AMT-027: UPB = UPA/((1+VR%)*(1-R%))
    const expUPB = rN(cs.UPA / ((1 + cs.VR/100) * (1 - cs.R/100)));
    chk('CHK-027 · UPB = UPA / ((1+VR%)·(1−R%))',
      Math.abs(res.UPB - expUPB) <= tol,
      `${fd(res.UPB)} ✓`,
      `Izračunato ${fd(expUPB)}, uneseno ${fd(res.UPB)}`);

    // CHK-AMT-028: PB = PA - VA
    const expPB = rN(res.PA - res.VA);
    chk('CHK-028 · PB = PA − VA',
      Math.abs(res.PB - expPB) <= tol,
      `${fd(res.PB)} ✓`,
      `Izračunato ${fd(expPB)}, uneseno ${fd(res.PB)}`);
  }

  // Extra: no negatives
  const hasNeg = [cs.Q, cs.R, cs.VR, cs.rr ? cs.UPB : cs.UPA].some(v => v < 0);
  chk('Sve vrijednosti pozitivne',
    !hasNeg, 'Nema negativnih vrijednosti', 'Postoje negativne vrijednosti u unosu');

  const container = document.getElementById('c-verify-results');
  const failures = checks.filter(c => !c.pass).length;
  container.style.display = 'block';

  // summary line
  const summaryColor = failures === 0 ? 'var(--green)' : 'var(--red)';
  const summaryIcon  = failures === 0 ? '✅' : '❌';
  const summaryText  = failures === 0
    ? 'Sve provjere prošle'
    : `${failures} provjera nije prošlo`;

  container.innerHTML = `
    <div style="padding:10px 0 8px; font-size:0.82rem; font-weight:600; color:${summaryColor};">
      ${summaryIcon} ${summaryText}
    </div>
    ${checks.map(c => `
      <div class="chk ${c.pass ? 'pass' : 'fail'}">
        <span class="chk-icon">${c.pass ? '✓' : '✗'}</span>
        <div class="chk-body">
          <div class="chk-title">${c.title}</div>
          <div class="chk-detail">${c.detail}</div>
        </div>
      </div>
    `).join('')}
  `;
}

document.querySelectorAll('input[name=rr]').forEach(r => r.addEventListener('change', () => {
  cs.rr = r.value === 'true';
  document.getElementById('c-verify-btn').className = 'verify-btn' + (cs.rr ? '' : ' rr-false');
  document.getElementById('c-verify-results').style.display = 'none';
  renderCalc();
}));
document.querySelectorAll('input[name=dec]').forEach(r => r.addEventListener('change', () => {
  cs.dec = parseInt(r.value);
  document.getElementById('c-verify-results').style.display = 'none';
  renderCalc();
}));

renderCalc();
</script>
</body>
</html>
